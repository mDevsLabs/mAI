<!doctype html>
<html class="desktop">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: transparent;
      }
      html[data-theme='dark'] {
        background: #141414;
      }
      html[data-theme='light'] {
        background: #fafafa;
      }
      #loading-screen {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: inherit;
        gap: 12px;
      }
      @keyframes loading-fade {
        0% { opacity: 0; }
        50% { opacity: 1; }
        100% { opacity: 0; }
      }
      #loading-brand {
        display: flex;
        align-items: center;
        gap: 12px;
        color: #1f1f1f;
      }
      #loading-brand svg text {
        fill: currentcolor;
        animation: loading-fade 2s ease-in-out infinite;
      }
      html[data-theme='dark'] #loading-brand {
        color: #f0f0f0;
      }
    </style>
  </head>
  <body>
    <script>
      (function () {
        var theme = 'system';
        try {
          theme = localStorage.getItem('theme') || 'system';
        } catch (_) {}
        var systemTheme =
          window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
            ? 'dark'
            : 'light';
        var resolvedTheme = theme === 'system' ? systemTheme : theme;
        if (resolvedTheme === 'dark' || resolvedTheme === 'light') {
          document.documentElement.setAttribute('data-theme', resolvedTheme);
        }
        var urlParams = new URLSearchParams(window.location.search);
        var locale = urlParams.get('lng') || navigator.language || 'en-US';
        document.documentElement.lang = locale;
        var rtl = ['ar', 'arc', 'dv', 'fa', 'ha', 'he', 'khw', 'ks', 'ku', 'ps', 'ur', 'yi'];
        document.documentElement.dir =
          rtl.indexOf(locale.split('-')[0].toLowerCase()) >= 0 ? 'rtl' : 'ltr';
      })();
    </script>
    <div id="loading-screen">
      <div id="loading-brand" aria-label="Loading" role="status">
        <svg height="40" viewBox="0 0 100 40" style="flex:none;line-height:1" xmlns="http://www.w3.org/2000/svg">
          <title>mAI</title>
          <text x="50%" y="50%" dominant-baseline="central" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="bold">mAI</text>
        </svg>
      </div>
    </div>
    <div id="root" style="height: 100%"></div>
    <script>
      window.__SERVER_CONFIG__ = undefined;
    </script>
    <script type="module" src="/src/spa/entry.popup.tsx"></script>
  </body>
</html>
