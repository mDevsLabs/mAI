name: Publication Bureau sur S3
description: Télécharger les artefacts de la version bureau vers le serveur de mise à jour S3

inputs:
  channel:
    description: 'Canal de mise à jour (stable, canary, nightly)'
    required: true
  version:
    description: 'Version publiée (ex: 2.1.29-canary.1)'
    required: true
  aws-access-key-id:
    description: 'ID de clé d''accès AWS'
    required: true
  aws-secret-access-key:
    description: 'Clé d''accès secrète AWS'
    required: true
  s3-bucket:
    description: 'Nom du bucket S3'
    required: true
  s3-region:
    description: 'Région S3 (par défaut us-east-1)'
    required: false
    default: 'us-east-1'
  s3-endpoint:
    description: 'Point de terminaison S3 personnalisé (pour R2/MinIO etc.)'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Télécharger les artefacts fusionnés
      uses: actions/download-artifact@v7
      with:
        name: merged-release
        path: release

    - name: Lister les artefacts à télécharger
      shell: bash
      run: |
        echo "📦 Artefacts à télécharger vers S3 :"
        ls -lah release/
        echo ""
        echo "📋 Fichiers YML dans release/ :"
        ls -la release/*.yml 2>/dev/null || echo "   ⚠️ Aucun fichier yml trouvé !"
        echo ""
        echo "📋 Version : ${{ inputs.version }}, Canal : ${{ inputs.channel }}"

    - name: Télécharger vers S3
      shell: bash
      env:
        AWS_ACCESS_KEY_ID: ${{ inputs.aws-access-key-id }}
        AWS_SECRET_ACCESS_KEY: ${{ inputs.aws-secret-access-key }}
        AWS_REGION: ${{ inputs.s3-region }}
        S3_BUCKET: ${{ inputs.s3-bucket }}
        S3_ENDPOINT: ${{ inputs.s3-endpoint }}
        CHANNEL: ${{ inputs.channel }}
        VERSION: ${{ inputs.version }}
      run: |
        if [ -z "$S3_BUCKET" ]; then
          echo "⚠️ Le bucket S3 n'est pas configuré, téléchargement S3 ignoré"
          exit 0
        fi

        ENDPOINT_ARG=""
        if [ -n "$S3_ENDPOINT" ]; then
          ENDPOINT_ARG="--endpoint-url $S3_ENDPOINT"
          echo "📡 Utilisation du point de terminaison S3 personnalisé : $S3_ENDPOINT"
        fi

        echo "🚀 Téléchargement vers le bucket S3 : $S3_BUCKET"
        echo "📁 Chemin cible : s3://$S3_BUCKET/$CHANNEL/"
        echo ""

        echo "📦 Téléchargement des fichiers de publication vers s3://$S3_BUCKET/$CHANNEL/$VERSION/"
        for file in release/*.dmg release/*.zip release/*.exe release/*.AppImage release/*.deb release/*.rpm release/*.snap release/*.tar.gz release/*.blockmap; do
          if [ -f "$file" ]; then
            filename=$(basename "$file")
            echo "   ↗️ $filename"
            aws s3 cp "$file" "s3://$S3_BUCKET/$CHANNEL/$VERSION/$filename" $ENDPOINT_ARG
          fi
        done

        echo ""
        if [ "$CHANNEL" = "stable" ]; then
          echo "📋 Création de stable*.yml à partir de latest*.yml..."
          for yml in release/latest*.yml; do
            if [ -f "$yml" ]; then
              stable_yml=$(basename "$yml" | sed 's/^latest/stable/')
              cp "$yml" "release/$stable_yml"
              echo "   📄 $stable_yml créé à partir de $(basename "$yml")"
            fi
          done
        fi

        echo ""
        echo "📋 Ajout du préfixe de version aux URL du manifeste yml..."
        for yml in release/${CHANNEL}*.yml release/latest*.yml; do
          if [ -f "$yml" ]; then
            sed -i "s|url: |url: $VERSION/|g" "$yml"
            echo "   📄 $(basename $yml) mis à jour avec le préfixe URL : $VERSION/"
          fi
        done

        RENDERER_TAR="release/mai-renderer.tar.gz"
        if [ -f "$RENDERER_TAR" ]; then
          echo ""
          echo "📋 Création du manifeste du renderer..."
          RENDERER_SHA512=$(shasum -a 512 "$RENDERER_TAR" | awk '{print $1}' | xxd -r -p | base64)
          RENDERER_SIZE=$(stat -f%z "$RENDERER_TAR" 2>/dev/null || stat -c%s "$RENDERER_TAR")
          RELEASE_DATE=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
          cat > "release/${CHANNEL}-renderer.yml" <<EOF
        version: $VERSION
        files:
          - url: $VERSION/mai-renderer.tar.gz
            sha512: $RENDERER_SHA512
            size: $RENDERER_SIZE
        path: $VERSION/mai-renderer.tar.gz
        sha512: $RENDERER_SHA512
        releaseDate: '$RELEASE_DATE'
        EOF
          echo "   📄 ${CHANNEL}-renderer.yml créé"
        fi

        echo ""
        echo "📋 Téléchargement des fichiers manifestes..."
        for yml in release/${CHANNEL}*.yml release/latest*.yml; do
          if [ -f "$yml" ]; then
            filename=$(basename "$yml")
            echo "   ↗️ $filename -> s3://$S3_BUCKET/$CHANNEL/$filename"
            aws s3 cp "$yml" "s3://$S3_BUCKET/$CHANNEL/$filename" $ENDPOINT_ARG
            echo "   ↗️ $filename -> s3://$S3_BUCKET/$CHANNEL/$VERSION/$filename (archive)"
            aws s3 cp "$yml" "s3://$S3_BUCKET/$CHANNEL/$VERSION/$filename" $ENDPOINT_ARG
          fi
        done

        echo ""
        echo "✅ Téléchargement S3 terminé !"
        echo ""
        echo "📋 Fichiers dans s3://$S3_BUCKET/$CHANNEL/ :"
        aws s3 ls "s3://$S3_BUCKET/$CHANNEL/" $ENDPOINT_ARG || true
        echo ""
        echo "📋 Fichiers dans s3://$S3_BUCKET/$CHANNEL/$VERSION/ :"
        aws s3 ls "s3://$S3_BUCKET/$CHANNEL/$VERSION/" $ENDPOINT_ARG || true
