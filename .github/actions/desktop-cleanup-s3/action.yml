name: Nettoyage S3 du Bureau
description: Supprimer les anciennes versions publiées de S3, en conservant les N versions les plus récentes

inputs:
  channel:
    description: 'Canal de mise à jour (stable, canary, nightly)'
    required: true
  keep-count:
    description: 'Nombre de versions récentes à conserver'
    required: false
    default: '15'
  aws-access-key-id:
    description: 'ID de clé d''accès AWS'
    required: true
  aws-secret-access-key:
    description: 'Clé d''accès secrète AWS'
    required: true
  s3-bucket:
    description: 'Nom du bucket S3'
    required: true
  s3-region:
    description: 'Région S3 (par défaut us-east-1)'
    required: false
    default: 'us-east-1'
  s3-endpoint:
    description: 'Point de terminaison S3 personnalisé (pour R2/MinIO etc.)'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Nettoyer les anciennes versions S3
      shell: bash
      env:
        AWS_ACCESS_KEY_ID: ${{ inputs.aws-access-key-id }}
        AWS_SECRET_ACCESS_KEY: ${{ inputs.aws-secret-access-key }}
        AWS_REGION: ${{ inputs.s3-region }}
        S3_BUCKET: ${{ inputs.s3-bucket }}
        S3_ENDPOINT: ${{ inputs.s3-endpoint }}
        CHANNEL: ${{ inputs.channel }}
        KEEP_COUNT: ${{ inputs.keep-count }}
      run: |
        if [ -z "$S3_BUCKET" ]; then
          echo "⚠️ Le bucket S3 n'est pas configuré, nettoyage ignoré"
          exit 0
        fi

        ENDPOINT_ARG=""
        if [ -n "$S3_ENDPOINT" ]; then
          ENDPOINT_ARG="--endpoint-url $S3_ENDPOINT"
        fi

        echo "🧹 Nettoyage des anciennes versions $CHANNEL de S3 (conservation des $KEEP_COUNT plus récentes)"
        echo ""

        all_versions=$(aws s3 ls "s3://$S3_BUCKET/$CHANNEL/" $ENDPOINT_ARG 2>/dev/null \
          | grep 'PRE ' \
          | awk '{print $2}' \
          | sed 's|/$||' \
          | sort -V)

        if [ -z "$all_versions" ]; then
          echo "📭 Aucun répertoire de version trouvé dans s3://$S3_BUCKET/$CHANNEL/"
          exit 0
        fi

        total=$(echo "$all_versions" | wc -l | tr -d ' ')
        echo "📋 $total version(s) trouvée(s) dans s3://$S3_BUCKET/$CHANNEL/"

        if [ "$total" -le "$KEEP_COUNT" ]; then
          echo "✅ Rien à nettoyer ($total <= $KEEP_COUNT)"
          exit 0
        fi

        delete_count=$((total - KEEP_COUNT))
        to_delete=$(echo "$all_versions" | head -n "$delete_count")

        echo "🗑️ Va supprimer $delete_count ancienne(s) version(s) :"
        echo "$to_delete" | while read -r version; do
          echo "   - $version"
        done
        echo ""

        echo "$to_delete" | while read -r version; do
          echo "🗑️ Suppression de s3://$S3_BUCKET/$CHANNEL/$version/ ..."
          aws s3 rm "s3://$S3_BUCKET/$CHANNEL/$version/" --recursive $ENDPOINT_ARG
        done

        echo ""
        echo "✅ Nettoyage terminé. $delete_count version(s) supprimée(s), $KEEP_COUNT conservée(s)."
