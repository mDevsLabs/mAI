name: Configuration de compilation Bureau
description: Configurer Node.js, pnpm et installer les dépendances pour la compilation bureau

inputs:
  node-version:
    description: Version de Node.js
    required: true

runs:
  using: composite
  steps:
    - name: Configurer l'environnement
      uses: ./.github/actions/setup-env
      with:
        node-version: ${{ inputs.node-version }}

    - name: Installer les dépendances
      shell: bash
      run: pnpm install --node-linker=hoisted

    - name: Supprimer le miroir electron de Chine de .npmrc
      shell: bash
      run: |
        NPMRC_FILE="./apps/desktop/.npmrc"
        if [ -f "$NPMRC_FILE" ]; then
          sed -i.bak '/^electron_mirror=/d; /^electron_builder_binaries_mirror=/d' "$NPMRC_FILE"
          rm -f "${NPMRC_FILE}.bak"
          echo "✅ Configuration du miroir electron supprimée de .npmrc"
        fi

    - name: Installer les dépendances sur le Bureau
      shell: bash
      run: npm run install-isolated --prefix=./apps/desktop
