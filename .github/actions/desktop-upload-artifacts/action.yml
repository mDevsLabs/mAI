name: Téléchargement d'Artefacts Bureau
description: Renommer le yml macOS pour l'architecture multiple et télécharger les artefacts de compilation

inputs:
  artifact-name:
    description: Nom de l'artefact téléchargé
    required: true
  retention-days:
    description: Nombre de jours pour conserver les artefacts
    required: false
    default: '5'

runs:
  using: composite
  steps:
    - name: Renommer *-mac.yml de macOS pour le support multi-architecture
      if: runner.os == 'macOS'
      shell: bash
      run: |
        cd apps/desktop/release
        SYSTEM_ARCH=$(uname -m)
        if [[ "$SYSTEM_ARCH" == "arm64" ]]; then
          ARCH_SUFFIX="arm64"
        else
          ARCH_SUFFIX="x64"
        fi
        for yml in *-mac.yml; do
          if [ -f "$yml" ]; then
            new_name="${yml%.yml}-${ARCH_SUFFIX}.yml"
            mv "$yml" "$new_name"
            echo "✅ $yml renommé en $new_name"
          fi
        done

    - name: Lister les fichiers yml avant le téléchargement
      shell: bash
      run: |
        echo "📋 Fichiers YML à télécharger :"
        ls -la apps/desktop/release/*.yml 2>/dev/null || echo "   ⚠️ Aucun fichier yml trouvé !"

    - name: Télécharger l'artefact
      uses: actions/upload-artifact@v6
      with:
        name: ${{ inputs.artifact-name }}
        path: |
          apps/desktop/release/*.yml
          apps/desktop/release/*.dmg*
          apps/desktop/release/*.zip*
          apps/desktop/release/*.exe*
          apps/desktop/release/*.AppImage
          apps/desktop/release/*.deb*
          apps/desktop/release/*.snap*
          apps/desktop/release/*.rpm*
          apps/desktop/release/*.tar.gz*
        retention-days: ${{ inputs.retention-days }}
