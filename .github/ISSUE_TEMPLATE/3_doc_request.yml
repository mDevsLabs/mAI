name: '📚 Demande de Documentation'
description: 'Signaler une documentation manquante, incorrecte ou à améliorer'
title: '[Documentation] '
type: Documentation
labels: ['documentation', 'non-confirmé']
body:
  - type: dropdown
    attributes:
      label: '📋 Type de Demande'
      description: 'Quel type de demande de documentation souhaitez-vous soumettre ?'
      options:
        - '✏️ Correction - Contenu incorrect ou obsolète'
        - '➕ Ajout - Documentation manquante'
        - '🔍 Clarification - Contenu peu clair ou ambigu'
        - '🌐 Traduction - Documentation non disponible en français'
        - '📸 Médias - Captures d''écran ou vidéos manquantes'
        - '🗂️ Structure - Mauvaise organisation ou navigation'
    validations:
      required: true

  - type: input
    attributes:
      label: '🔗 Lien vers la Documentation Concernée'
      description: 'Indiquez l''URL de la page de documentation concernée si applicable'
      placeholder: 'https://lobehub.com/zh/docs/...'
    validations:
      required: false

  - type: textarea
    attributes:
      label: '📝 Description du Problème'
      description: 'Décrivez clairement ce qui manque, ce qui est incorrect ou ce qui pourrait être amélioré dans la documentation.'
      placeholder: |
        La documentation sur X ne mentionne pas...
        La section Y est incorrecte car...
        Il manque des explications sur...
    validations:
      required: true

  - type: textarea
    attributes:
      label: '💡 Contenu Suggéré'
      description: 'Proposez le contenu ou les modifications que vous aimeriez voir ajoutés. Vous pouvez utiliser le format Markdown.'
      placeholder: |
        ## Titre de la section suggérée

        Voici ce que la documentation devrait expliquer...

        ` Exemple de code si nécessaire`
    validations:
      required: false

  - type: dropdown
    attributes:
      label: '🎯 Public Cible'
      description: 'À quel type d''utilisateur cette documentation est-elle destinée ?'
      multiple: true
      options:
        - '🔰 Débutants - Nouveaux utilisateurs de mAI'
        - '⚙️ Développeurs - Intégration et API'
        - '🚀 Administrateurs - Déploiement et configuration'
        - '🌍 Tous les utilisateurs'
    validations:
      required: true

  - type: dropdown
    attributes:
      label: '🎯 Priorité Estimée'
      description: 'Selon vous, quelle est l''urgence de cette mise à jour de documentation ?'
      options:
        - '🔴 Critique - Bloque la compréhension ou l''utilisation de mAI'
        - '🟠 Haute - Crée une confusion importante'
        - '🟡 Moyenne - Améliorerait la clarté globale'
        - '🟢 Basse - Simple suggestion d''amélioration'
    validations:
      required: true

  - type: dropdown
    attributes:
      label: '🛠️ Prêt à Contribuer ?'
      description: 'Seriez-vous prêt(e) à rédiger ou améliorer cette documentation vous-même ?'
      options:
        - 'Oui, je suis prêt(e) à soumettre une PR avec les modifications'
        - 'Oui, je peux aider à relire et valider les modifications'
        - 'Non, mais je reste disponible pour répondre aux questions'
        - 'Je ne sais pas encore'
    validations:
      required: false

  - type: textarea
    attributes:
      label: '📝 Informations Complémentaires'
      description: 'Ajoutez tout contexte supplémentaire utile : captures d''écran, références externes, exemples concrets, etc.'
      placeholder: 'Contexte additionnel, liens utiles, captures d''écran...'
    validations:
      required: false

  - type: checkboxes
    attributes:
      label: '✅ Validations'
      description: 'Merci de vérifier les points suivants avant de soumettre votre demande'
      options:
        - label: "J'ai vérifié qu'il n'existe pas [déjà une demande similaire](https://github.com/mDevsLabs/mAI/issues) afin d'éviter les doublons."
          required: true
        - label: "J'ai consulté la [documentation existante](https://lobehub.com/zh/docs) avant de soumettre cette demande."
          required: true
        - label: 'Cette demande concerne directement la documentation de mAI.'
          required: true
        - label: "Pour toute question générale, j'utiliserai les [GitHub Discussions](https://github.com/mDevsLabs/mAI/discussions) ou le [Serveur Discord](https://discord.gg/fV7zwdGPpY)."
          required: true
