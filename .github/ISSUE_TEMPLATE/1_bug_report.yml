name: '🐛 Rapport de Bug'
description: 'Signaler un bug sur mAI'
labels: ['non-confirmé']
type: Bug
body:
  - type: dropdown
    attributes:
      label: '📱 Type de Client'
      description: 'Sélectionnez comment vous accédez à mAI'
      multiple: true
      options:
        - 'Web (Navigateur Desktop)'
        - 'Web (Navigateur Mobile)'
        - 'Application Desktop (Electron)'
        - 'Application Mobile (React Native)'
        - 'Autre'
    validations:
      required: true

  - type: dropdown
    attributes:
      label: '💻 Système d''Exploitation'
      description: 'Sélectionnez votre système d''exploitation'
      multiple: true
      options:
        - 'Windows'
        - 'macOS'
        - 'Ubuntu'
        - 'Autre Linux'
        - 'iOS'
        - 'Android'
        - 'Autre'
    validations:
      required: true

  - type: dropdown
    attributes:
      label: '🌐 Navigateur'
      description: 'Sélectionnez le(s) navigateur(s) concerné(s)'
      multiple: true
      options:
        - 'Chrome'
        - 'Edge'
        - 'Safari'
        - 'Firefox'
        - 'Autre'
    validations:
      required: true

  - type: dropdown
    attributes:
      label: '📦 Plateforme de Déploiement'
      description: 'Sélectionnez votre plateforme de déploiement si applicable'
      multiple: true
      options:
        - 'Cloud Officiel'
        - 'Vercel'
        - 'Zeabur'
        - 'Sealos'
        - 'Netlify'
        - 'Auto-hébergement Docker'
        - 'Autre'
    validations:
      required: false

  - type: input
    attributes:
      label: '📌 Version de mAI'
      description: 'Indiquez la version exacte de mAI que vous utilisez (ex: v1.0.0)'
      placeholder: 'v1.0.0'
    validations:
      required: true

  - type: textarea
    attributes:
      label: '🐛 Description du Bug'
      description: 'Décrivez le bug de manière claire et précise. Si vous avez sélectionné "Autre" dans les options ci-dessus, merci de préciser.'
      placeholder: 'Lorsque je fais X, il se passe Y au lieu de Z...'
    validations:
      required: true

  - type: textarea
    attributes:
      label: '📷 Étapes pour Reproduire'
      description: 'Détaillez les étapes précises pour reproduire le bug'
      placeholder: |
        1. Aller sur '...'
        2. Cliquer sur '...'
        3. Faire défiler jusqu'à '...'
        4. Observer l'erreur
    validations:
      required: true

  - type: textarea
    attributes:
      label: '🚦 Comportement Attendu'
      description: 'Décrivez ce qui devrait normalement se passer'
      placeholder: 'L''action devrait entraîner...'
    validations:
      required: true

  - type: textarea
    attributes:
      label: '📝 Informations Complémentaires'
      description: 'Ajoutez toute information utile : captures d''écran, logs, liens, etc.'
      placeholder: 'Logs, captures d''écran, contexte supplémentaire...'
    validations:
      required: false

  - type: dropdown
    attributes:
      label: '🛠️ Prêt à Soumettre une PR ?'
      description: 'Seriez-vous prêt(e) à soumettre une Pull Request pour corriger ce bug ?'
      options:
        - 'Oui, je suis prêt(e) à soumettre une PR'
        - 'Non, mais je suis disponible pour tester le correctif'
        - 'Je ne sais pas encore'
    validations:
      required: false

  - type: checkboxes
    attributes:
      label: '✅ Validations'
      description: 'Merci de vérifier les points suivants avant de soumettre'
      options:
        - label: "J'ai lu la documentation."
          required: true
        - label: "J'ai vérifié qu'il n'existe pas [déjà un rapport](https://github.com/mDevsLabs/mAI/issues) pour ce bug."
          required: true
        - label: 'Je confirme que ce bug est lié à mAI et non à une bibliothèque tierce.'
          required: true
        - label: "Ce rapport concerne un bug concret. Pour toute question, j'utiliserai les [GitHub Discussions](https://github.com/mDevsLabs/mAI/discussions) ou Discord."
          required: true
