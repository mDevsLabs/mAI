name: ✨ Release Desktop Stable

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

permissions: read-all

env:
  NODE_VERSION: '24.11.1'

jobs:
  check-stable:
    name: 🔍 Check Release Version
    runs-on: ubuntu-latest
    outputs:
      is_stable: ${{ steps.check.outputs.is_stable }}
      version: ${{ steps.check.outputs.version }}
      is_manual: ${{ steps.check.outputs.is_manual }}
      release_notes: ${{ steps.check.outputs.release_notes }}
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: ℹ️ Check release info
        id: check
        run: |
          version=$(jq -r .version package.json)
          echo "is_manual=false" >> $GITHUB_OUTPUT
          echo "version=${version}" >> $GITHUB_OUTPUT
          echo "release_notes=" >> $GITHUB_OUTPUT
          echo "is_stable=true" >> $GITHUB_OUTPUT
          echo "✅ Stable release detected from package.json: $version"

  configure-build:
    needs: [check-stable]
    if: needs.check-stable.outputs.is_stable == 'true'
    name: 🛠️ Configure Build Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: 📊 Generate Matrix
        id: set-matrix
        run: |
          static_matrix='[]'

          if [[ "${{ github.event_name }}" != "workflow_dispatch" ]] || [[ "${{ inputs.build_windows }}" == "true" ]]; then
            static_matrix=$(echo "$static_matrix" | jq -c '. + [{"os": "windows-2025", "name": "windows-2025"}]')
          fi

          if [[ "${{ github.event_name }}" != "workflow_dispatch" ]] || [[ "${{ inputs.build_linux }}" == "true" ]]; then
            static_matrix=$(echo "$static_matrix" | jq -c '. + [{"os": "ubuntu-latest", "name": "ubuntu-latest"}]')
          fi

          if [[ "${{ github.event_name }}" != "workflow_dispatch" ]] || [[ "${{ inputs.build_mac }}" == "true" ]]; then
            echo "Using GitHub-Hosted Runner for macOS ARM64"
            arm_entry='{"os": "macos-15", "name": "macos-arm64"}'
            static_matrix=$(echo "$static_matrix" | jq -c --argjson entry "$arm_entry" '. + [$entry]')
          fi

          echo "matrix={\"include\":$static_matrix}" >> $GITHUB_OUTPUT

  build:
    needs: [check-stable, configure-build]
    if: needs.check-stable.outputs.is_stable == 'true'
    name: 📦 Build Desktop App (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.configure-build.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: ⚙️ Setup build environment
        uses: ./.github/actions/desktop-build-setup
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🏷️ Set package version
        run: npm run workflow:set-desktop-version ${{ needs.check-stable.outputs.version }} stable

      - name: 🧹 Clean previous build artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          sudo rm -rf apps/desktop/release || true
          sudo rm -rf apps/desktop/dist || true
          sudo rm -rf /tmp/electron-builder* || true

      - name: 🍏 Build artifact on macOS
        if: runner.os == 'macOS'
        run: npm run desktop:package:app
        env:
          UPDATE_CHANNEL: stable
          UPDATE_SERVER_URL: ${{ secrets.UPDATE_SERVER_URL }}
          RELEASE_NOTES: ${{ needs.check-stable.outputs.release_notes }}
          APP_URL: http://localhost:3015
          DATABASE_URL: 'postgresql://postgres@localhost:5432/postgres'
          KEY_VAULTS_SECRET: 'oLXWIiR/AKF+rWaqy9lHkrYgzpATbW3CtJp3UfkVgpE='
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          CSC_FOR_PULL_REQUEST: true
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NEXT_PUBLIC_DESKTOP_PROJECT_ID: ${{ secrets.UMAMI_STABLE_DESKTOP_PROJECT_ID }}
          NEXT_PUBLIC_DESKTOP_UMAMI_BASE_URL: ${{ secrets.UMAMI_STABLE_DESKTOP_BASE_URL }}
          DEBUG_DMG: true

      - name: 🪟 Build artifact on Windows
        if: runner.os == 'Windows'
        run: npm run desktop:package:app
        env:
          UPDATE_CHANNEL: stable
          UPDATE_SERVER_URL: ${{ secrets.UPDATE_SERVER_URL }}
          RELEASE_NOTES: ${{ needs.check-stable.outputs.release_notes }}
          APP_URL: http://localhost:3015
          DATABASE_URL: 'postgresql://postgres@localhost:5432/postgres'
          KEY_VAULTS_SECRET: 'oLXWIiR/AKF+rWaqy9lHkrYgzpATbW3CtJp3UfkVgpE='
          NEXT_PUBLIC_DESKTOP_PROJECT_ID: ${{ secrets.UMAMI_STABLE_DESKTOP_PROJECT_ID }}
          NEXT_PUBLIC_DESKTOP_UMAMI_BASE_URL: ${{ secrets.UMAMI_STABLE_DESKTOP_BASE_URL }}
          TEMP: C:\temp
          TMP: C:\temp

      - name: 🐧 Build artifact on Linux
        if: runner.os == 'Linux'
        run: |
          npm run desktop:package:app
          test -d apps/desktop/dist/renderer
          tar -czf apps/desktop/release/mai-renderer.tar.gz -C apps/desktop/dist/renderer .
        env:
          UPDATE_CHANNEL: stable
          UPDATE_SERVER_URL: ${{ secrets.UPDATE_SERVER_URL }}
          RELEASE_NOTES: ${{ needs.check-stable.outputs.release_notes }}
          APP_URL: http://localhost:3015
          DATABASE_URL: 'postgresql://postgres@localhost:5432/postgres'
          KEY_VAULTS_SECRET: 'oLXWIiR/AKF+rWaqy9lHkrYgzpATbW3CtJp3UfkVgpE='
          NEXT_PUBLIC_DESKTOP_PROJECT_ID: ${{ secrets.UMAMI_STABLE_DESKTOP_PROJECT_ID }}
          NEXT_PUBLIC_DESKTOP_UMAMI_BASE_URL: ${{ secrets.UMAMI_STABLE_DESKTOP_BASE_URL }}

      - name: 📤 Upload artifacts
        uses: ./.github/actions/desktop-upload-artifacts
        with:
          artifact-name: release-${{ matrix.name }}

  merge-mac-files:
    needs: [build, check-stable]
    name: 🔗 Merge macOS Release Files
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: ⚙️ Setup environment
        uses: ./.github/actions/setup-env
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: ⬇️ Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: release
          pattern: release-*
          merge-multiple: true

      - name: 🗂️ List downloaded artifacts
        run: ls -R release

      - name: 📦 Install yaml only for merge step
        run: |
          cd scripts/electronWorkflow
          if [ ! -f package.json ]; then
            echo '{"name":"merge-mac-release","private":true}' > package.json
          fi
          bun add --no-save yaml@2.8.1

      - name: 🤝 Merge mac YAML files
        run: bun run scripts/electronWorkflow/mergeMacReleaseFiles.js

      - name: 📤 Upload artifacts with merged macOS files
        uses: actions/upload-artifact@v6
        with:
          name: merged-release
          path: release/
          retention-days: 1

  publish-github:
    needs: [merge-mac-files, check-stable]
    name: 🐙 Publish to GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: ⬇️ Download merged artifacts
        uses: actions/download-artifact@v7
        with:
          name: merged-release
          path: release

      - name: 🗂️ List final artifacts
        run: ls -R release

      - name: 🚀 Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.check-stable.outputs.version }}
          draft: false
          files: |
            release/stable*
            release/latest*
            release/*.dmg*
            release/*.zip*
            release/*.exe*
            release/*.AppImage
            release/*.deb*
            release/*.snap*
            release/*.rpm*
            release/*.tar.gz*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-s3:
    needs: [merge-mac-files, check-stable]
    name: 🪣 Publish to S3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/desktop-publish-s3
        with:
          channel: stable
          version: ${{ needs.check-stable.outputs.version }}
          aws-access-key-id: ${{ secrets.UPDATE_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.UPDATE_AWS_SECRET_ACCESS_KEY }}
          s3-bucket: ${{ secrets.UPDATE_S3_BUCKET }}
          s3-region: ${{ secrets.UPDATE_S3_REGION }}
          s3-endpoint: ${{ secrets.UPDATE_S3_ENDPOINT }}