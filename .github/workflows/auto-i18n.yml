name: 🌐 Auto i18n Translation

on:
  schedule:
    - cron: '0 2 * * *' # Every day at 2am
  workflow_dispatch: # Allows manual trigger

jobs:
  translation:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 🌐 Run i18n Translation
        env:
          OPENAI_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENAI_PROXY_URL: https://api.mistral.ai/v1
        run: |
          sed -i "s/'gpt-4o'/'open-mistral-nemo'/g" .i18nrc.js
          pnpm run i18n

      - name: 🚀 Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(i18n): 🌐 auto translate locales"
          title: "🌐 chore(i18n): Auto translate locales via Mistral"
          body: |
            This PR was automatically generated by the `auto-i18n` GitHub Action.
            It uses Mistral AI (`open-mistral-nemo`, their most cost-effective model) to translate missing keys.
          branch: auto-i18n
          base: canary
