name: 🔀 Création Automatique de PR

on:
  push:
    branches-ignore:
      - 'canary'
      - 'main'
      - 'master'

jobs:
  auto-pr:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Récupération du code
        uses: actions/checkout@v4

      - name: 🚀 Création ou Mise à jour de la PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CANARY_BRANCH: 'canary'
        run: |
          TEMPLATE_PATH=".github/PULL_REQUEST_TEMPLATE.md"
          
          if [ ! -f "$TEMPLATE_PATH" ]; then
            echo "❌ Erreur : Le fichier $TEMPLATE_PATH n'existe pas !"
            exit 1
          fi

          BRANCH_NAME="${{ github.ref_name }}"
          EVENT_BRANCH="${{ github.event.ref }}"
          EVENT_NAME="${{ github.event_name }}"

          # Skip if push to canary branch
          if [[ "$BRANCH_NAME" == "refs/heads/$CANARY_BRANCH" ]]; then
            echo "⏭️ Skip canary branch: create-pr will only handle non-canary branches"
            exit 0
          fi

          # Get version from current branch
          VERSION_FILE="package.json"
          if [ ! -f "$VERSION_FILE" ]; then
            echo "❌ Erreur : Le fichier $VERSION_FILE n'existe pas !"
            exit 1
          fi

          CURRENT_VERSION=$(node -p "require('./$VERSION_FILE').version")

          # Get canary package.json and its sha via GitHub API
          CANARY_JSON_DATA=$(gh api "repos/${{ github.repository }}/contents/$VERSION_FILE?ref=$CANARY_BRANCH" 2>/dev/null || echo "")
          CANARY_SHA=""
          CANARY_VERSION=""
          if [ -n "$CANARY_JSON_DATA" ]; then
            CANARY_SHA=$(echo "$CANARY_JSON_DATA" | jq -r '.sha' 2>/dev/null || echo "")
            CANARY_CONTENT_BASE64=$(echo "$CANARY_JSON_DATA" | jq -r '.content' | tr -d '\n\r' 2>/dev/null || echo "")
            if [ -n "$CANARY_CONTENT_BASE64" ]; then
              CANARY_VERSION=$(node -p "
                try {
                  const buf = Buffer.from('$CANARY_CONTENT_BASE64', 'base64');
                  const pkg = JSON.parse(buf.toString('utf8'));
                  pkg.version || '';
                } catch (e) {
                  '';
                }
              " 2>/dev/null || echo "")
            fi
          fi

          if [ -z "$CANARY_VERSION" ]; then
            echo "⚠️ Impossible de récupérer la version canary, en utilisant ${CURRENT_VERSION}"
            TARGET_VERSION="$CURRENT_VERSION"
          else
            echo "📊 Version actuelle : $CURRENT_VERSION"
            echo "📊 Version canary : $CANARY_VERSION"

            # Compare versions
            TARGET_VERSION=$(node -p "
              const cmp = (a, b) => {
                const pa = String(a).split('.').map(Number);
                const pb = String(b).split('.').map(Number);
                for (let i = 0; i < 3; i++) {
                  if ((pa[i] || 0) > (pb[i] || 0)) return 1;
                  if ((pa[i] || 0) < (pb[i] || 0)) return -1;
                }
                return 0;
              };
              cmp('$CURRENT_VERSION', '$CANARY_VERSION') > 0 ? '$CURRENT_VERSION' : '$CANARY_VERSION';
            " 2>/dev/null || echo "$CURRENT_VERSION")
            echo "🎯 Version cible : $TARGET_VERSION"
          fi

          # On vérifie si une PR existe déjà pour cette branche pour éviter les doublons
          PR_NUMBER=$(gh pr list --head "$BRANCH_NAME" --json number --jq '.[0].number')

          if [ -n "$PR_NUMBER" ]; then
            # If we have a PR, check if we need to update the canary dependency
            TARGET_BRANCH_PR=$(gh pr view "$PR_NUMBER" --json baseRefName --jq '.baseRefName')
            if [[ "$TARGET_BRANCH_PR" == "$CANARY_BRANCH" ]]; then
              echo "✅ PR #$PR_NUMBER existe déjà vers $CANARY_BRANCH"
              # Update canary package.json with newer version if needed
              if [[ "$TARGET_VERSION" != "$CANARY_VERSION" ]] && [ -n "$CANARY_SHA" ] && [ -n "$CANARY_CONTENT_BASE64" ]; then
                echo "🔄 Mise à jour de la version canary depuis $CANARY_VERSION vers $TARGET_VERSION"
                # Update version in the decoded JSON content and re-encode to base64
                NEW_CONTENT_BASE64=$(node -p "
                  try {
                    const buf = Buffer.from('$CANARY_CONTENT_BASE64', 'base64');
                    const pkg = JSON.parse(buf.toString('utf8'));
                    pkg.version = '$TARGET_VERSION';
                    Buffer.from(JSON.stringify(pkg, null, 2) + '\n').toString('base64');
                  } catch (e) {
                    '';
                  }
                " 2>/dev/null || echo "")

                if [ -n "$NEW_CONTENT_BASE64" ]; then
                  gh api "repos/${{ github.repository }}/contents/$VERSION_FILE" \
                    --method PUT \
                    --field message="Mise à jour de la version canary depuis $CURRENT_VERSION vers $TARGET_VERSION via PR #$PR_NUMBER" \
                    --field content="$NEW_CONTENT_BASE64" \
                    --field sha="$CANARY_SHA" \
                    --field branch="$CANARY_BRANCH"
                  echo "✅ Package.json canary mis à jour vers $TARGET_VERSION"
                else
                  echo "❌ Erreur de génération du nouveau package.json pour canary"
                fi
              fi
              exit 0
            else
              echo "⚠️ La PR #$PR_NUMBER existe déjà mais n'est pas vers $CANARY_BRANCH"
              exit 0
            fi
          else
            echo "🆕 Aucune PR trouvée. Création d'une nouvelle PR vers $CANARY_BRANCH..."
            gh pr create \
              --title "$CURRENT_VERSION → Canary" \
              --body-file "$TEMPLATE_PATH" \
              --head "$BRANCH_NAME" \
              --base "$CANARY_BRANCH"
          fi