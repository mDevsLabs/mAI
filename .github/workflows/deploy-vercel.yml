name: Deploy to Vercel via GitHub Actions

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  Deploy-Production:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code 📦
        uses: actions/checkout@v4

      - name: Vérifier les secrets Vercel 🔑
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "::error::Le secret VERCEL_TOKEN est manquant dans les paramètres GitHub !"
            exit 1
          fi
          if [ -z "${{ secrets.VERCEL_ORG_ID }}" ]; then
            echo "::error::Le secret VERCEL_ORG_ID est manquant dans les paramètres GitHub !"
            exit 1
          fi
          if [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "::error::Le secret VERCEL_PROJECT_ID est manquant dans les paramètres GitHub !"
            exit 1
          fi

      - name: Nettoyer le dossier .vercel résiduel 🧹
        run: rm -rf .vercel

      - name: Setup Environment (Node.js, pnpm & Bun) 🛠️
        uses: ./.github/actions/setup-env
        with:
          node-version: 20

      - name: Install Vercel CLI 🚀
        run: npm install --global vercel@latest

      - name: Install des dépendances 📥
        run: pnpm install

      - name: Pull Vercel Environment Information 🌍
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts 🏗️
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel 🌐
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
